<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>串口管理工具</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <section>
          <p class="eyebrow">Serial Port Manager</p>
          <h1>串口管理工具</h1>
        </section>
        <section class="actions" aria-label="窗口操作">
          <button id="refreshButton" class="icon-button" title="立即刷新" aria-label="立即刷新">
            <span>&#8635;</span>
          </button>
          <button id="trayButton" class="icon-button" title="隐藏到托盘" aria-label="隐藏到托盘">
            <span>&#9472;</span>
          </button>
        </section>
      </header>

      <section class="summary-grid" aria-label="串口概览">
        <div class="metric-pair">
          <article class="metric">
            <span class="metric-label">当前串口</span>
            <strong id="portCount">0</strong>
          </article>
          <article class="metric">
            <span class="metric-label">已命名</span>
            <strong id="aliasCount">0</strong>
          </article>
        </div>
        <article class="metric metric-wide">
          <span class="metric-label">最后刷新</span>
          <strong id="updatedAt">--</strong>
        </article>
      </section>

      <section class="content-grid">
        <section class="panel port-panel">
          <div class="panel-heading">
            <h2>串口列表</h2>
            <span id="scanStatus" class="status-pill">监听中</span>
          </div>
          <div class="port-tools">
            <label class="search-box" aria-label="搜索串口">
              <span>&#8981;</span>
              <input id="portSearchInput" type="search" placeholder="搜索 COM、名称、厂商、服务、分组，正则用 /.../i" autocomplete="off" />
            </label>
            <span id="portSearchMeta" class="search-meta">共 0 个</span>
          </div>
          <div class="ports-workspace">
            <div class="groups-strip" aria-label="串口分组">
              <div id="groupsBar" class="groups-bar"></div>
            </div>
            <div class="port-list-area">
              <div id="scanLoader" class="scan-loader" role="status" aria-live="polite">
                <span class="scan-ring"></span>
                <strong>正在扫描串口</strong>
                <span>正在读取设备列表和占用状态...</span>
              </div>
              <div id="portsList" class="ports-list"></div>
              <div id="emptyPorts" class="empty-state">
                <strong>未发现串口</strong>
                <span>插入 USB 串口设备后会自动显示。</span>
              </div>
            </div>
          </div>
        </section>

        <aside class="panel event-panel">
          <div class="panel-heading">
            <h2>最近事件</h2>
            <button id="clearEventsButton" class="quiet-button" type="button" disabled>清空</button>
          </div>
          <div id="eventsList" class="events-list"></div>
          <div id="emptyEvents" class="empty-state compact">
            <strong>暂无插拔事件</strong>
            <span>首次打开不会弹出历史设备通知。</span>
          </div>
        </aside>
      </section>
    </main>

    <script src="./shared/port-filter.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
